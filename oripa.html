<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1210" />
  <title>WS オリパ店｜店內抽選（デモ）</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #fff8ee;
      --gold: #f0c14b;
      --wood: #3d2818;
      --wood-l: #5c3d24;
      --r-n: #9ca3af; --r-r: #60a5fa; --r-sr: #c084fc; --r-ssr: #fbbf24; --r-sec: #f43f5e;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Noto Sans TC", "Noto Sans JP", "Zen Maru Gothic", sans-serif;
      background: #0f0c0a;
      color: var(--cream);
      overflow: hidden;
      -webkit-tap-highlight-color: rgba(255,200,100,.25);
    }
    button { font: inherit; cursor: pointer; border: none; touch-action: manipulation; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #1a1410, #0f0c0a 50%);
    }

    /* 頂欄 */
    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 14px;
      padding-top: max(10px, var(--safe-t));
      background: rgba(0,0,0,.5);
      border-bottom: 1px solid rgba(255,200,120,.12);
      z-index: 10;
    }
    .coins {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(240,193,75,.35);
      font-weight: 700;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
    }
    .coins::before {
      content: "P";
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffe566, #c9a020);
      color: #5c3d00;
      font-size: .7rem;
      font-weight: 900;
      display: grid; place-items: center;
    }
    .topbar-actions { display: flex; gap: 6px; }
    .btn-sm {
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.2);
      color: var(--cream);
      font-size: .75rem;
      font-weight: 600;
    }
    .btn-sm:active { transform: scale(.97); }

    /* 階段容器：只顯示當前 phase */
    .main { flex: 1; min-height: 0; position: relative; overflow: hidden; }
    .phase {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .phase.is-active { display: flex; }

    .phase-title {
      text-align: center;
      padding: 12px 16px 8px;
      flex-shrink: 0;
    }
    .phase-title h2 {
      font-family: "Zen Maru Gothic", sans-serif;
      font-size: 1.1rem;
      letter-spacing: .08em;
    }
    .phase-title p { font-size: .75rem; color: rgba(255,248,238,.5); margin-top: 4px; }

    /* ── SHOP ── */
    .shop-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px 100px;
      -webkit-overflow-scrolling: touch;
    }
    .shelf-tag {
      font-size: .7rem;
      font-weight: 700;
      color: rgba(255,248,238,.45);
      letter-spacing: .12em;
      margin: 12px 0 8px;
    }
    .box-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .box-card {
      text-align: left;
      padding: 0;
      border-radius: 12px;
      background: transparent;
      color: inherit;
      width: 100%;
      position: relative;
    }
    .box-card:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .box-card.is-selected .pack-visual {
      outline: 3px solid var(--gold);
      outline-offset: 2px;
      transform: translateY(-4px);
    }
    .pack-visual {
      aspect-ratio: 2/3;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0,0,0,.45);
      transition: transform .2s;
    }
    .pack-visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 42%, rgba(255,255,255,.2) 50%, transparent 58%);
      animation: shine 2.5s ease-in-out infinite;
    }
    @keyframes shine {
      0%, 100% { transform: translateX(-80%); }
      50% { transform: translateX(80%); }
    }
    .pack-seal {
      position: absolute;
      top: 8%; left: 50%; transform: translateX(-50%);
      font-size: .55rem; font-weight: 900;
      padding: 2px 6px;
      background: rgba(0,0,0,.55);
      border-radius: 3px;
      white-space: nowrap;
    }
    .pack-foot {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px 6px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,.9));
      font-size: .6rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }
    .box-meta {
      margin-top: 6px;
      font-size: .72rem;
    }
    .box-meta .price { color: var(--gold); font-weight: 700; }
    .box-meta .remain { color: rgba(255,248,238,.45); }

    .shop-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px calc(12px + var(--safe-b));
      background: linear-gradient(transparent, rgba(0,0,0,.9) 30%);
      display: flex;
      gap: 10px;
      z-index: 5;
    }
    .btn-main {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-weight: 900;
      font-size: .95rem;
      letter-spacing: .06em;
      background: linear-gradient(180deg, #ff6b9d, #c2185b);
      color: #fff;
      box-shadow: 0 4px 0 #8e1040;
    }
    .btn-main:not(:disabled):active { transform: translateY(2px); box-shadow: 0 2px 0 #8e1040; }
    .btn-sub {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: var(--cream);
      font-weight: 700;
      font-size: .85rem;
    }

    /* ── PICK ── */
    .pick-grid {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      align-content: center;
      padding: 16px;
      overflow-y: auto;
    }
    .pick-pack {
      width: 88px;
      padding: 0;
      background: none;
      color: inherit;
    }
    .pick-pack:active .pack-visual { transform: scale(.95); }

    /* ── OPEN ── */
    .open-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .open-pack {
      width: 150px;
      height: 225px;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
      transition: transform .5s, opacity .5s;
    }
    .open-pack.is-open {
      transform: scale(1.05);
      opacity: 0;
    }
    .open-flash {
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.85), transparent 65%);
      opacity: 0;
      pointer-events: none;
    }
    .open-flash.show { animation: flash .5s ease-out; }
    @keyframes flash {
      0% { opacity: 0; transform: scale(.4); }
      40% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.5); }
    }
    .open-text { font-size: .9rem; color: rgba(255,248,238,.6); letter-spacing: .15em; }

    /* ── REVEAL ── */
    .reveal-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 20px;
    }
    .card-flip {
      width: min(240px, 65vw);
      aspect-ratio: 63/88;
      perspective: 900px;
      border: none;
      background: none;
      padding: 0;
    }
    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .7s cubic-bezier(.2,.9,.3,1);
    }
    .card-flip.is-flipped .card-inner { transform: rotateY(180deg); }
    .card-side {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,.5);
    }
    .card-side.back {
      background: linear-gradient(145deg, #1e3a5f, #0f172a);
      display: grid;
      place-items: center;
      font-size: 2rem;
      font-weight: 900;
      color: rgba(255,255,255,.12);
    }
    .card-side.front { transform: rotateY(180deg); background: #111; }
    .card-side.front img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .reveal-meta { text-align: center; }
    .reveal-rarity { font-size: 1.5rem; font-weight: 900; letter-spacing: .12em; }
    .reveal-name { font-size: 1rem; font-weight: 700; margin-top: 4px; }
    .reveal-no { font-size: .78rem; opacity: .5; font-family: monospace; margin-top: 4px; }
    .reveal-hint { font-size: .78rem; opacity: .45; margin-top: 8px; }
    .reveal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding-bottom: calc(12px + var(--safe-b));
    }

    /* ── DETAIL modal（仍在 app 內） ── */
    .modal {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0,0,0,.75);
    }
    .modal.is-open { display: flex; }
    .modal-panel {
      width: min(400px, 100%);
      max-height: 80vh;
      overflow-y: auto;
      background: #1f1916;
      border: 1px solid rgba(255,200,120,.2);
      border-radius: 16px;
      padding: 20px;
    }
    .modal-panel h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .odds { width: 100%; font-size: .75rem; border-collapse: collapse; margin: 12px 0; }
    .odds td, .odds th { padding: 6px; border-bottom: 1px solid rgba(255,255,255,.06); text-align: left; }
    .r-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 800;
      font-size: .65rem;
    }
    .r-tag[data-r="N"] { background: rgba(156,163,175,.2); color: var(--r-n); }
    .r-tag[data-r="R"] { background: rgba(96,165,250,.2); color: var(--r-r); }
    .r-tag[data-r="SR"] { background: rgba(192,132,252,.2); color: var(--r-sr); }
    .r-tag[data-r="SSR"] { background: rgba(251,191,36,.2); color: var(--r-ssr); }
    .r-tag[data-r="SEC"] { background: rgba(244,63,94,.2); color: var(--r-sec); }

    /* 履歴 */
    .drawer {
      position: absolute;
      top: 0; right: 0;
      width: min(320px, 88vw);
      height: 100%;
      z-index: 40;
      background: #1a1412;
      border-left: 1px solid rgba(255,200,120,.15);
      transform: translateX(100%);
      transition: transform .3s;
      display: flex;
      flex-direction: column;
    }
    .drawer.is-open { transform: translateX(0); }
    .drawer-head {
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .drawer-list { flex: 1; overflow-y: auto; padding: 10px; }
    .hist-row {
      display: flex;
      gap: 10px;
      padding: 8px;
      margin-bottom: 8px;
      background: rgba(255,255,255,.04);
      border-radius: 8px;
      font-size: .75rem;
    }
    .hist-row img { width: 36px; height: 50px; object-fit: cover; border-radius: 4px; background: #222; }

    .toast {
      position: fixed;
      bottom: calc(80px + var(--safe-b));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,.85);
      border: 1px solid rgba(255,200,120,.3);
      font-size: .8rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .debug-bar {
      font-size: .65rem;
      text-align: center;
      padding: 4px;
      color: rgba(255,248,238,.35);
      background: rgba(0,0,0,.3);
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="coins" id="elCoins">10000 P</div>
      <div class="topbar-actions">
        <button type="button" class="btn-sm" data-action="history">履歴</button>
        <button type="button" class="btn-sm" data-action="reset">重置</button>
      </div>
    </header>

    <div class="main">
      <!-- 賣場 -->
      <section class="phase is-active" id="phaseShop" data-phase="shop">
        <div class="phase-title">
          <h2>WS オリパ専門店</h2>
          <p>點選喜歡的箱 → 按下方「從櫃上取一包」</p>
        </div>
        <div class="shop-scroll" id="shopList"></div>
        <footer class="shop-footer">
          <button type="button" class="btn-sub" data-action="detail" id="btnDetail" disabled>確率</button>
          <button type="button" class="btn-main" data-action="start-draw" id="btnDraw" disabled>從櫃上取一包</button>
        </footer>
      </section>

      <!-- 選包 -->
      <section class="phase" id="phasePick" data-phase="pick">
        <div class="phase-title">
          <h2>選擇您要的那一包</h2>
          <p>櫃上殘り <span id="pickRemainText">—</span> 包 · 點一包帶走</p>
        </div>
        <div class="pick-grid" id="pickGrid"></div>
        <footer class="shop-footer">
          <button type="button" class="btn-sub" data-action="cancel-pick">取消並退款</button>
        </footer>
      </section>

      <!-- 開封 -->
      <section class="phase" id="phaseOpen" data-phase="open">
        <div class="open-center">
          <div class="open-flash" id="openFlash"></div>
          <div class="open-pack" id="openPack"></div>
          <p class="open-text" id="openText">開封中…</p>
        </div>
      </section>

      <!-- 揭曉 -->
      <section class="phase" id="phaseReveal" data-phase="reveal">
        <div class="reveal-body">
          <button type="button" class="card-flip" id="btnFlip" data-action="flip">
            <div class="card-inner">
              <div class="card-side back">WS</div>
              <div class="card-side front">
                <img id="revealImg" src="" alt="" />
              </div>
            </div>
          </button>
          <div class="reveal-meta">
            <div class="reveal-rarity" id="revealRarity">—</div>
            <div class="reveal-name" id="revealName">—</div>
            <div class="reveal-no" id="revealNo">—</div>
            <p class="reveal-hint" id="revealHint">點擊卡牌翻面</p>
          </div>
        </div>
        <div class="reveal-actions" id="revealActions" hidden>
          <button type="button" class="btn-main" data-action="draw-again">再抽一包</button>
          <button type="button" class="btn-sub" data-action="back-shop">回賣場</button>
        </div>
      </section>
    </div>

    <div class="modal" id="modalDetail">
      <div class="modal-panel" id="modalContent"></div>
    </div>

    <aside class="drawer" id="drawer">
      <div class="drawer-head">
        <strong>抽選履歴</strong>
        <button type="button" class="btn-sm" data-action="close-drawer">關閉</button>
      </div>
      <div class="drawer-list" id="drawerList"></div>
    </aside>

    <p class="debug-bar" id="debugBar">phase: shop</p>
  </div>
  <div class="toast" id="toast"></div>

  <script>
  (function () {
    "use strict";

    var STORAGE_KEY = "ws_oripa_v2";
    var INITIAL_COINS = 10000;
    var IMG_BASE = "https://ws-tcg.com/wordpress/wp-content/images/cardlist";

    var BOXES = [
      {
        id: "sao-s80", shelf: "刀劍神域", name: "SAO/S80 夢幻オリパ",
        price: 880, total: 80,
        foil: "linear-gradient(145deg,#0ea5e9,#0c4a6e)", seal: "S80",
        pool: [
          { r: "N", w: 42, no: "SAO/S80-001", name: "一般角色" },
          { r: "R", w: 28, no: "SAO/S80-018", name: "強化キャラ" },
          { r: "SR", w: 14, no: "SAO/S80-024", name: "キリト SR" },
          { r: "SSR", w: 5, no: "SAO/S80-050", name: "アスナ SSR" },
          { r: "SEC", w: 1.2, no: "SAO/S80-079", name: "シンクロ SEC" }
        ]
      },
      {
        id: "hol-w91", shelf: "ホロライブ", name: "HOL/W91 閃光オリパ",
        price: 1200, total: 60,
        foil: "linear-gradient(145deg,#f472b6,#831843)", seal: "W91",
        pool: [
          { r: "N", w: 40, no: "HOL/W91-003", name: "メンバー N" },
          { r: "R", w: 30, no: "HOL/W91-015", name: "サポート R" },
          { r: "SR", w: 18, no: "HOL/W91-028", name: "衣装 SR" },
          { r: "SSR", w: 8, no: "HOL/W91-045", name: "ライブ SSR" },
          { r: "SEC", w: 2, no: "HOL/W91-078", name: "ホロライブ SEC" }
        ]
      },
      {
        id: "bd-w54", shelf: "BanG Dream!", name: "BD/W54 ライブオリパ",
        price: 980, total: 70,
        foil: "linear-gradient(145deg,#fb923c,#7c2d12)", seal: "W54",
        pool: [
          { r: "N", w: 44, no: "BD/W54-002", name: "メンバー" },
          { r: "R", w: 32, no: "BD/W54-020", name: "ライブ R" },
          { r: "SR", w: 16, no: "BD/W54-035", name: "リーダー SR" },
          { r: "SSR", w: 6, no: "BD/W54-052", name: "箔押し SSR" },
          { r: "SEC", w: 1.5, no: "BD/W54-070", name: "スペシャル SEC" }
        ]
      },
      {
        id: "osk-s104", shelf: "推しの子", name: "OSK/S104 スターオリパ",
        price: 1500, total: 50,
        foil: "linear-gradient(145deg,#a78bfa,#4c1d95)", seal: "S104",
        pool: [
          { r: "N", w: 38, no: "OSK/S104-005", name: "キャラ N" },
          { r: "R", w: 28, no: "OSK/S104-018", name: "シーン R" },
          { r: "SR", w: 20, no: "OSK/S104-032", name: "KV SR" },
          { r: "SSR", w: 10, no: "OSK/S104-055", name: "ステージ SSR" },
          { r: "SEC", w: 3, no: "OSK/S104-090", name: "【推し】SEC" }
        ]
      }
    ];

    var R_COLORS = { N: "#9ca3af", R: "#60a5fa", SR: "#c084fc", SSR: "#fbbf24", SEC: "#f43f5e" };

    // ── 狀態 ──
    var phase = "shop";
    var selectedId = null;
    var session = null; // { boxId, price, card }
    var memStore = null;

    function defaultState() {
      var remain = {};
      for (var i = 0; i < BOXES.length; i++) remain[BOXES[i].id] = BOXES[i].total;
      return { coins: INITIAL_COINS, remain: remain, history: [] };
    }

    function loadState() {
      try {
        var raw = null;
        try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { raw = memStore; }
        if (!raw) return defaultState();
        var s = JSON.parse(raw);
        if (!s.remain) s.remain = defaultState().remain;
        if (typeof s.coins !== "number") s.coins = INITIAL_COINS;
        if (!s.history) s.history = [];
        return s;
      } catch (e) {
        return defaultState();
      }
    }

    var state = loadState();

    function saveState() {
      var json = JSON.stringify(state);
      memStore = json;
      try { localStorage.setItem(STORAGE_KEY, json); } catch (e) {}
      renderCoins();
    }

    function getBox(id) {
      for (var i = 0; i < BOXES.length; i++) if (BOXES[i].id === id) return BOXES[i];
      return null;
    }

    function cardImgUrl(cardNo) {
      var m = String(cardNo).match(/^([A-Za-z0-9]+)\/([A-Za-z0-9]+)-([A-Za-z0-9]+)$/);
      if (!m) return "";
      var series = m[1].toLowerCase();
      var setId = m[2].toLowerCase();
      var num = m[3].toLowerCase();
      var folder = series + "_" + setId;
      return IMG_BASE + "/" + series.charAt(0) + "/" + folder + "/" + folder + "_" + num + ".png";
    }

    function placeholder(label) {
      var t = encodeURIComponent(String(label || "?").slice(0, 8));
      return "data:image/svg+xml," + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="180" height="252"><rect fill="#1a1a2e" width="100%" height="100%"/><text x="50%" y="50%" fill="#888" font-size="12" text-anchor="middle" dominant-baseline="middle">' + t + "</text></svg>"
      );
    }

    function setImg(el, cardNo, name) {
      var url = cardImgUrl(cardNo);
      el.onerror = function () { el.onerror = null; el.src = placeholder(name || cardNo); };
      el.src = url || placeholder(name || cardNo);
    }

    function drawCard(pool) {
      var total = 0;
      for (var i = 0; i < pool.length; i++) total += pool[i].w;
      var r = Math.random() * total;
      for (var j = 0; j < pool.length; j++) {
        r -= pool[j].w;
        if (r <= 0) {
          var p = pool[j];
          return { rarity: p.r, cardNo: p.no, name: p.name };
        }
      }
      var last = pool[pool.length - 1];
      return { rarity: last.r, cardNo: last.no, name: last.name };
    }

    function poolOdds(pool) {
      var total = 0, by = {};
      for (var i = 0; i < pool.length; i++) {
        total += pool[i].w;
        by[pool[i].r] = (by[pool[i].r] || 0) + pool[i].w;
      }
      var out = [];
      var order = ["N", "R", "SR", "SSR", "SEC"];
      for (var k = 0; k < order.length; k++) {
        if (by[order[k]]) out.push({ r: order[k], pct: ((by[order[k]] / total) * 100).toFixed(1) });
      }
      return out;
    }

    // ── UI ──
    var el = {
      coins: document.getElementById("elCoins"),
      shopList: document.getElementById("shopList"),
      btnDetail: document.getElementById("btnDetail"),
      btnDraw: document.getElementById("btnDraw"),
      pickGrid: document.getElementById("pickGrid"),
      pickRemainText: document.getElementById("pickRemainText"),
      openPack: document.getElementById("openPack"),
      openFlash: document.getElementById("openFlash"),
      openText: document.getElementById("openText"),
      revealImg: document.getElementById("revealImg"),
      revealRarity: document.getElementById("revealRarity"),
      revealName: document.getElementById("revealName"),
      revealNo: document.getElementById("revealNo"),
      revealHint: document.getElementById("revealHint"),
      revealActions: document.getElementById("revealActions"),
      btnFlip: document.getElementById("btnFlip"),
      modal: document.getElementById("modalDetail"),
      modalContent: document.getElementById("modalContent"),
      drawer: document.getElementById("drawer"),
      drawerList: document.getElementById("drawerList"),
      debugBar: document.getElementById("debugBar"),
      toast: document.getElementById("toast"),
      phases: {
        shop: document.getElementById("phaseShop"),
        pick: document.getElementById("phasePick"),
        open: document.getElementById("phaseOpen"),
        reveal: document.getElementById("phaseReveal")
      }
    };

    function toast(msg) {
      el.toast.textContent = msg;
      el.toast.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(function () { el.toast.classList.remove("show"); }, 2200);
    }

    function setPhase(name) {
      phase = name;
      var keys = ["shop", "pick", "open", "reveal"];
      for (var i = 0; i < keys.length; i++) {
        var node = el.phases[keys[i]];
        if (node) node.classList.toggle("is-active", keys[i] === name);
      }
      if (el.debugBar) el.debugBar.textContent = "phase: " + name + (selectedId ? " | box: " + selectedId : "");
    }

    function renderCoins() {
      el.coins.textContent = state.coins.toLocaleString() + " P";
    }

    function updateShopFooter() {
      var box = selectedId ? getBox(selectedId) : null;
      var remain = box ? (state.remain[box.id] || 0) : 0;
      var ok = box && state.coins >= box.price && remain > 0;
      el.btnDetail.disabled = !box;
      el.btnDraw.disabled = !ok;
      if (!box) {
        el.btnDraw.textContent = "從櫃上取一包";
      } else if (remain <= 0) {
        el.btnDraw.textContent = "已售完";
      } else if (state.coins < box.price) {
        el.btnDraw.textContent = "ポイント不足";
      } else {
        el.btnDraw.textContent = "從櫃上取一包（" + box.price.toLocaleString() + " P）";
      }
    }

    function packHtml(box, extraClass) {
      var remain = state.remain[box.id] || 0;
      return (
        '<div class="pack-visual" style="background:' + box.foil + '">' +
        '<span class="pack-seal">' + box.seal + '</span>' +
        '<span class="pack-foot">' + box.name + '</span></div>' +
        '<div class="box-meta"><span class="price">' + box.price.toLocaleString() + ' P</span> · ' +
        '<span class="remain">残り ' + remain + '</span></div>'
      );
    }

    function renderShop() {
      var html = "";
      var lastShelf = "";
      for (var i = 0; i < BOXES.length; i++) {
        var b = BOXES[i];
        if (b.shelf !== lastShelf) {
          if (lastShelf) html += "</div>";
          html += '<p class="shelf-tag">▸ ' + b.shelf + '</p><div class="box-grid">';
          lastShelf = b.shelf;
        }
        var sel = selectedId === b.id ? " is-selected" : "";
        html += '<button type="button" class="box-card' + sel + '" data-action="select-box" data-box-id="' + b.id + '">' +
          packHtml(b) + "</button>";
      }
      html += "</div>";
      el.shopList.innerHTML = html;
      updateShopFooter();
    }

    function renderPick(box) {
      var remain = state.remain[box.id] || 0;
      el.pickRemainText.textContent = String(remain);
      var n = Math.min(10, Math.max(6, remain + 1));
      var html = "";
      for (var i = 0; i < n; i++) {
        html += '<button type="button" class="pick-pack" data-action="confirm-pick" data-pick-index="' + i + '">' +
          packHtml(box) + "</button>";
      }
      el.pickGrid.innerHTML = html;
    }

    function renderHistory() {
      if (!state.history.length) {
        el.drawerList.innerHTML = '<p style="opacity:.45;font-size:.8rem;padding:8px">尚無紀錄</p>';
        return;
      }
      var html = "";
      for (var i = 0; i < state.history.length; i++) {
        var h = state.history[i];
        html += '<div class="hist-row">' +
          '<img src="' + cardImgUrl(h.cardNo) + '" alt="" data-fallback="' + i + '"/>' +
          '<div><span class="r-tag" data-r="' + h.rarity + '">' + h.rarity + '</span> ' + h.name +
          "<br><small>" + h.cardNo + "</small></div></div>";
      }
      el.drawerList.innerHTML = html;
      var imgs = el.drawerList.querySelectorAll("img");
      for (var j = 0; j < imgs.length; j++) {
        (function (img, idx) {
          img.onerror = function () {
            img.onerror = null;
            img.src = placeholder(state.history[idx].name);
          };
        })(imgs[j], j);
      }
    }

    // ── 流程 ──
    function selectBox(id) {
      selectedId = id;
      renderShop();
      var box = getBox(id);
      if (box) toast("已選：「" + box.name + "」→ 按下方取一包");
    }

    function openDetailModal() {
      var box = getBox(selectedId);
      if (!box) return;
      var remain = state.remain[box.id] || 0;
      var odds = poolOdds(box.pool);
      var rows = "";
      for (var i = 0; i < odds.length; i++) {
        rows += "<tr><td><span class=\"r-tag\" data-r=\"" + odds[i].r + "\">" + odds[i].r +
          "</span></td><td>" + odds[i].pct + "%</td></tr>";
      }
      el.modalContent.innerHTML =
        "<h3>" + box.name + "</h3>" +
        "<p style='font-size:.8rem;opacity:.6'>価格 " + box.price.toLocaleString() + " P · 残り " + remain + "</p>" +
        "<table class='odds'><tr><th>レア</th><th>参考率</th></tr>" + rows + "</table>" +
        "<footer class='shop-footer' style='position:static;padding:12px 0 0'>" +
        "<button type='button' class='btn-sub' data-action='close-modal'>閉じる</button>" +
        "<button type='button' class='btn-main' data-action='start-draw'>櫃から取る</button></footer>";
      el.modal.classList.add("is-open");
    }

    function startDraw() {
      var box = getBox(selectedId);
      if (!box) { toast("請先點選一個オリパ箱"); return; }
      var remain = state.remain[box.id] || 0;
      if (remain <= 0) { toast("此箱已售完"); return; }
      if (state.coins < box.price) { toast("ポイント不足"); return; }

      state.coins -= box.price;
      state.remain[box.id] = remain - 1;
      var card = drawCard(box.pool);
      session = { boxId: box.id, price: box.price, card: card };
      saveState();

      renderPick(box);
      setPhase("pick");
      el.modal.classList.remove("is-open");
    }

    function cancelPick() {
      if (!session) { setPhase("shop"); return; }
      var box = getBox(session.boxId);
      if (box) {
        state.coins += session.price;
        state.remain[box.id] = (state.remain[box.id] || 0) + 1;
      }
      session = null;
      saveState();
      renderShop();
      setPhase("shop");
      toast("已取消並退還ポイント");
    }

    function confirmPick() {
      if (!session) return;
      var box = getBox(session.boxId);
      if (!box) return;

      el.openPack.style.background = box.foil;
      el.openPack.classList.remove("is-open");
      el.openFlash.classList.remove("show");
      el.openText.textContent = "スリットを開けています…";
      setPhase("open");

      setTimeout(function () {
        el.openPack.classList.add("is-open");
        el.openFlash.classList.add("show");
        el.openText.textContent = "カード出現！";
      }, 500);

      setTimeout(function () {
        showReveal(box, session.card);
        session = null;
      }, 1100);
    }

    function showReveal(box, card) {
      setImg(el.revealImg, card.cardNo, card.name);
      el.revealRarity.textContent = card.rarity;
      el.revealRarity.style.color = R_COLORS[card.rarity] || "#fff";
      el.revealName.textContent = card.name;
      el.revealNo.textContent = card.cardNo;
      el.btnFlip.classList.remove("is-flipped");
      el.revealHint.hidden = false;
      el.revealActions.hidden = true;

      state.history.unshift({
        rarity: card.rarity,
        name: card.name,
        cardNo: card.cardNo,
        boxName: box.name,
        at: Date.now()
      });
      if (state.history.length > 40) state.history.length = 40;
      saveState();
      renderHistory();
      renderShop();

      setPhase("reveal");
    }

    function flipReveal() {
      if (el.btnFlip.classList.contains("is-flipped")) return;
      el.btnFlip.classList.add("is-flipped");
      el.revealHint.hidden = true;
      setTimeout(function () { el.revealActions.hidden = false; }, 400);
    }

    function drawAgain() {
      if (!selectedId) { setPhase("shop"); return; }
      startDraw();
    }

    function backShop() {
      setPhase("shop");
    }

    function resetAll() {
      if (!confirm("重置デモ？ポイント與庫存將恢復。")) return;
      state = defaultState();
      selectedId = null;
      session = null;
      saveState();
      renderShop();
      renderHistory();
      setPhase("shop");
      el.modal.classList.remove("is-open");
      el.drawer.classList.remove("is-open");
      toast("已重置");
    }

    // ── 單一點擊入口（事件委派） ──
    function onAppClick(ev) {
      var target = ev.target.closest("[data-action]");
      if (!target) return;

      var action = target.getAttribute("data-action");
      var boxId = target.getAttribute("data-box-id");

      switch (action) {
        case "select-box":
          if (boxId) selectBox(boxId);
          break;
        case "detail":
          openDetailModal();
          break;
        case "start-draw":
          startDraw();
          break;
        case "confirm-pick":
          confirmPick();
          break;
        case "cancel-pick":
          cancelPick();
          break;
        case "flip":
          flipReveal();
          break;
        case "draw-again":
          drawAgain();
          break;
        case "back-shop":
          backShop();
          break;
        case "history":
          renderHistory();
          el.drawer.classList.add("is-open");
          break;
        case "close-drawer":
          el.drawer.classList.remove("is-open");
          break;
        case "close-modal":
          el.modal.classList.remove("is-open");
          break;
        case "reset":
          resetAll();
          break;
        default:
          break;
      }
    }

    // 點 modal 背景關閉
    el.modal.addEventListener("click", function (ev) {
      if (ev.target === el.modal) el.modal.classList.remove("is-open");
    });

    document.getElementById("app").addEventListener("click", onAppClick, false);

    // 啟動
    renderCoins();
    renderShop();
    renderHistory();
    setPhase("shop");

    if (location.protocol === "file:") {
      toast("建議用 http://localhost 開啟，不要用 file://");
    }
  })();
  </script>
</body>
</html>
